<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="APAGEA designs and builds calm, durable software systems.">
    <title>APAGEA</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #06142c;
            --bg-soft: #0a1b38;
            --ink: #f4f0e8;
            --muted: rgba(244, 240, 232, 0.68);
            --quiet: rgba(244, 240, 232, 0.42);
            --line: rgba(244, 240, 232, 0.13);
            --focus: #d9c68c;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 38%),
                radial-gradient(circle at 50% 18%, rgba(217, 198, 140, 0.08), transparent 34rem),
                var(--bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        body::before {
            position: fixed;
            inset: 0;
            pointer-events: none;
            content: "";
            background-image:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: linear-gradient(to bottom, transparent, black 18%, black 62%, transparent);
            opacity: 0.22;
        }

        .site {
            position: relative;
            display: grid;
            min-height: 100vh;
            grid-template-rows: auto 1fr auto;
            padding: clamp(1.25rem, 3vw, 2.5rem);
        }

        .topbar,
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            min-height: 2.5rem;
            color: var(--quiet);
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .mark {
            color: var(--muted);
            text-decoration: none;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: clamp(0.85rem, 2.5vw, 1.5rem);
        }

        a {
            color: inherit;
            text-decoration-color: transparent;
            text-underline-offset: 0.35em;
            transition: color 180ms ease, text-decoration-color 180ms ease;
        }

        a:hover {
            color: var(--ink);
            text-decoration-color: currentColor;
        }

        a:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 0.35rem;
            border-radius: 2px;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        main {
            display: grid;
            place-items: center;
            padding: 7vh 0 10vh;
        }

        .hero {
            width: min(100%, 58rem);
            text-align: center;
        }

        .logo {
            display: block;
            width: min(82vw, 44rem);
            height: auto;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(0.6rem) scale(0.985);
            animation: reveal 900ms cubic-bezier(0.16, 1, 0.3, 1) 120ms forwards;
        }

        .statement {
            max-width: 34rem;
            margin: clamp(1.75rem, 5vw, 2.75rem) auto 0;
            color: var(--muted);
            font-size: clamp(1rem, 1.15vw, 1.15rem);
            line-height: 1.75;
            opacity: 0;
            transform: translateY(0.45rem);
            animation: reveal 900ms cubic-bezier(0.16, 1, 0.3, 1) 320ms forwards;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: clamp(1.5rem, 4vw, 2.25rem);
            opacity: 0;
            transform: translateY(0.45rem);
            animation: reveal 900ms cubic-bezier(0.16, 1, 0.3, 1) 460ms forwards;
        }

        .button {
            display: inline-flex;
            min-height: 2.75rem;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(244, 240, 232, 0.18);
            border-radius: 999px;
            padding: 0 1.15rem;
            background: rgba(244, 240, 232, 0.045);
            color: var(--ink);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-decoration: none;
            backdrop-filter: blur(14px);
        }

        .button.secondary {
            background: transparent;
            color: var(--muted);
        }

        .button:hover {
            border-color: rgba(244, 240, 232, 0.34);
            text-decoration: none;
        }

        .signal {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .signal::before {
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 999px;
            background: var(--focus);
            box-shadow: 0 0 1rem rgba(217, 198, 140, 0.7);
            content: "";
        }

        .modal {
            width: min(calc(100vw - 2rem), 34rem);
            border: 1px solid rgba(244, 240, 232, 0.16);
            border-radius: 8px;
            padding: 0;
            color: var(--ink);
            background: rgba(6, 20, 44, 0.96);
            box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.38);
        }

        .modal::backdrop {
            background: rgba(3, 8, 18, 0.72);
            backdrop-filter: blur(12px);
        }

        .modal-panel {
            padding: clamp(1.25rem, 4vw, 2rem);
        }

        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 1.8rem);
            font-weight: 500;
            line-height: 1.2;
        }

        .modal-copy {
            margin: 0.55rem 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .close-button {
            display: inline-grid;
            width: 2.25rem;
            height: 2.25rem;
            flex: 0 0 auto;
            place-items: center;
            border: 1px solid rgba(244, 240, 232, 0.14);
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 1.25rem;
            line-height: 1;
        }

        .close-button:hover {
            color: var(--ink);
            border-color: rgba(244, 240, 232, 0.28);
        }

        .contact-form {
            display: grid;
            gap: 0.95rem;
        }

        .field {
            display: grid;
            gap: 0.4rem;
        }

        .field label {
            color: var(--quiet);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid rgba(244, 240, 232, 0.14);
            border-radius: 6px;
            padding: 0.85rem 0.9rem;
            color: var(--ink);
            background: rgba(244, 240, 232, 0.045);
            outline: none;
            transition: border-color 180ms ease, background 180ms ease;
        }

        .field textarea {
            min-height: 8rem;
            resize: vertical;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: var(--focus);
            background: rgba(244, 240, 232, 0.07);
        }

        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 0.45rem;
        }

        .form-status {
            min-height: 1.25rem;
            margin: 0;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.4;
        }

        .form-status[data-tone="error"] {
            color: #f0b8a8;
        }

        .form-status[data-tone="success"] {
            color: var(--focus);
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                color-scheme: light;
                --bg: #f7f5ef;
                --bg-soft: #efebe1;
                --ink: #06142c;
                --muted: rgba(6, 20, 44, 0.68);
                --quiet: rgba(6, 20, 44, 0.46);
                --line: rgba(6, 20, 44, 0.1);
                --focus: #9f7c32;
            }

            body {
                background:
                    linear-gradient(180deg, rgba(6, 20, 44, 0.035), transparent 38%),
                    radial-gradient(circle at 50% 18%, rgba(159, 124, 50, 0.09), transparent 34rem),
                    var(--bg);
            }

            .logo {
                content: url("logo-l.png");
            }

            .button {
                border-color: rgba(6, 20, 44, 0.14);
                background: rgba(6, 20, 44, 0.035);
            }

            .button:hover {
                border-color: rgba(6, 20, 44, 0.28);
            }

            .modal {
                border-color: rgba(6, 20, 44, 0.14);
                background: rgba(247, 245, 239, 0.98);
                box-shadow: 0 2rem 6rem rgba(6, 20, 44, 0.18);
            }

            .modal::backdrop {
                background: rgba(6, 20, 44, 0.38);
            }

            .close-button,
            .field input,
            .field textarea {
                border-color: rgba(6, 20, 44, 0.14);
            }

            .field input,
            .field textarea {
                background: rgba(6, 20, 44, 0.035);
            }

            .field input:focus,
            .field textarea:focus {
                background: rgba(6, 20, 44, 0.055);
            }

            .form-status[data-tone="error"] {
                color: #9b3d2f;
            }
        }

        @media (max-width: 640px) {
            .site {
                padding: 1rem;
            }

            .topbar,
            .footer {
                font-size: 0.68rem;
                letter-spacing: 0.13em;
            }

            .topbar {
                align-items: flex-start;
            }

            .nav {
                gap: 0.75rem;
            }

            .logo {
                width: min(88vw, 32rem);
            }

            .statement {
                max-width: 20rem;
                line-height: 1.65;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
                width: min(100%, 18rem);
                margin-inline: auto;
            }

            .footer {
                align-items: flex-end;
            }

            .form-footer {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="site">
        <header class="topbar" aria-label="Site header">
            <a class="mark" href="/" aria-label="APAGEA home">APAGEA LLC.</a>
            <nav class="nav" aria-label="Primary navigation">
                <a href="#contact" data-contact-open>Contact Us</a>
            </nav>
        </header>

        <main>
            <section class="hero" aria-labelledby="intro">
                <img class="logo" src="logo-d.png" alt="APAGEA">
                <div class="actions" aria-label="Primary actions">
                    <a class="button" href="https://blog.apagea.com">Read the Blog</a>
                </div>
            </section>
        </main>

        <footer class="footer">
            <span>EST. 2022</span>
            <span>&copy; 2026 - All Rights Reserved.</span>
        </footer>
    </div>

    <dialog class="modal" id="contact-modal" aria-labelledby="contact-title">
        <div class="modal-panel">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="contact-title">Contact Us</h2>
                    <p class="modal-copy"></p>
                </div>
                <button class="close-button" type="button" data-contact-close aria-label="Close contact form">&times;</button>
            </div>

            <form class="contact-form" id="contact-form">
                <div class="field">
                    <label for="contact-name">Name</label>
                    <input id="contact-name" name="name" autocomplete="name" required>
                </div>

                <div class="field">
                    <label for="contact-email">Email</label>
                    <input id="contact-email" name="email" type="email" autocomplete="email" required>
                </div>

                <div class="field">
                    <label for="contact-phone">Phone</label>
                    <input id="contact-phone" name="phone" type="tel" autocomplete="tel">
                </div>

                <div class="field">
                    <label for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" required></textarea>
                </div>

                <div class="form-footer">
                    <p class="form-status" id="contact-status" aria-live="polite"></p>
                    <button class="button" type="submit">Send Message</button>
                </div>
            </form>
        </div>
    </dialog>

    <script>
        const contactModal = document.querySelector("#contact-modal");
        const contactForm = document.querySelector("#contact-form");
        const contactStatus = document.querySelector("#contact-status");
        const submitButton = contactForm.querySelector("button[type='submit']");

        function setStatus(message, tone = "") {
            contactStatus.textContent = message;
            if (tone) {
                contactStatus.dataset.tone = tone;
            } else {
                delete contactStatus.dataset.tone;
            }
        }

        document.querySelectorAll("[data-contact-open]").forEach((trigger) => {
            trigger.addEventListener("click", (event) => {
                event.preventDefault();
                setStatus("");
                contactModal.showModal();
                contactModal.querySelector("input").focus();
            });
        });

        document.querySelector("[data-contact-close]").addEventListener("click", () => {
            contactModal.close();
        });

        contactModal.addEventListener("click", (event) => {
            if (event.target === contactModal) {
                contactModal.close();
            }
        });

        contactForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!contactForm.reportValidity()) {
                return;
            }

            const formData = new FormData(contactForm);
            const payload = {
                name: formData.get("name").trim(),
                email: formData.get("email").trim(),
                phone: formData.get("phone").trim(),
                message: formData.get("message").trim()
            };

            if (!payload.name || !payload.email || !payload.message) {
                setStatus("Name, email, and message are required.", "error");
                return;
            }

            submitButton.disabled = true;
            setStatus("Sending...");

            try {
                const response = await fetch("/submit", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error("Request failed");
                }

                contactForm.reset();
                setStatus("Message sent.", "success");
            } catch (error) {
                setStatus("Unable to send right now. Please try again.", "error");
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
